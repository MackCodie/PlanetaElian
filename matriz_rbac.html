<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Permisos RBAC | DSS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
    <style>
        body { padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; }
        .rbac-container {
            background: white; padding: 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 900px;
            border: 1px solid #e2e8f0; animation: fadeIn 0.5s ease;
        }
        .header-title { margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header-title h2 { margin: 0; color: #1e293b; font-size: 22px; }
        .header-title p { margin: 5px 0 0 0; color: #64748b; font-size: 14px; }
        
        .matrix-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; background: #fff; }
        .matrix-table th, .matrix-table td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .matrix-table th { background-color: #f8fafc; color: #475569; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .matrix-table th:first-child { text-align: left; padding-left: 20px; }
        .matrix-table td:first-child { text-align: left; padding-left: 20px; font-weight: 600; color: #1e293b; font-size: 14px; }
        
        .checkbox-wrapper input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #2563eb; }
        
        .btn-save { background-color: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background-color: #1d4ed8; transform: translateY(-2px); }
        
        #mensajeGuardado { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 14px; text-align: center; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body style="display: none;"> 
    <div class="rbac-container">
        <div class="header-title">
            <div>
                <h2><i class="fa-solid fa-shield-halved"></i> Matriz de Control de Acceso (RBAC)</h2>
                <p>Asigna o revoca permisos granulares para cada rol del sistema.</p>
            </div>
            <button onclick="window.location.href='menu_usuarios.html'" class="btn-submit" style="width: auto; padding: 8px 15px; margin: 0; background: #64748b;">Volver</button>
        </div>

        <table class="matrix-table">
            <thead>
                <tr>
                    <th>Rol / Permiso</th>
                    <th title="alumno_select">Ver Alumnos</th>
                    <th title="alumno_insert">Crear Alumnos</th>
                    <th title="alumno_delete">Borrar Alumnos</th>
                    <th title="tomar_asistencia">Asistencia</th>
                    <th title="ver_calificaciones">Ver Calif.</th>
                </tr>
            </thead>
            <tbody id="tablaRBAC">
                <tr>
                    <td>Administrador</td>
                    <td><input type="checkbox" data-rol="1" data-permiso="1" disabled checked></td>
                    <td><input type="checkbox" data-rol="1" data-permiso="2" disabled checked></td>
                    <td><input type="checkbox" data-rol="1" data-permiso="4" disabled checked></td>
                    <td><input type="checkbox" data-rol="1" data-permiso="5" disabled checked></td>
                    <td><input type="checkbox" data-rol="1" data-permiso="6" disabled checked></td>
                </tr>
                <tr>
                    <td>Profesor</td>
                    <td><input type="checkbox" data-rol="2" data-permiso="1"></td>
                    <td><input type="checkbox" data-rol="2" data-permiso="2"></td>
                    <td><input type="checkbox" data-rol="2" data-permiso="4"></td>
                    <td><input type="checkbox" data-rol="2" data-permiso="5"></td>
                    <td><input type="checkbox" data-rol="2" data-permiso="6"></td>
                </tr>
                <tr>
                    <td>Alumno</td>
                    <td><input type="checkbox" data-rol="3" data-permiso="1"></td>
                    <td><input type="checkbox" data-rol="3" data-permiso="2" disabled></td>
                    <td><input type="checkbox" data-rol="3" data-permiso="4" disabled></td>
                    <td><input type="checkbox" data-rol="3" data-permiso="5" disabled></td>
                    <td><input type="checkbox" data-rol="3" data-permiso="6"></td>
                </tr>
            </tbody>
        </table>

        <div style="display: flex; justify-content: flex-end; align-items: center; gap: 20px;">
            <div id="statusLoader" style="display: none; color: #64748b; font-size: 13px;">
                <i class="fa-solid fa-spinner fa-spin"></i> Guardando...
            </div>
            <button class="btn-save" onclick="guardarRBAC()">
                <i class="fa-solid fa-floppy-disk"></i> Guardar Cambios
            </button>
        </div>
        
        <div id="mensajeGuardado"></div>
    </div>

    <script>
        // 1. MIDDLEWARE DE SEGURIDAD
        async function protegerRuta(rolesPermitidos) {
            try {
                const res = await fetch('api_verificar_sesion.php');
                if (!res.ok) throw new Error("No autenticado");
                const sesion = await res.json();
                
                if (!sesion.autenticado || !rolesPermitidos.includes(sesion.rol)) {
                    window.location.replace('index.html');
                    return false;
                }
                return sesion;
            } catch (error) {
                window.location.replace('index.html');
                return false;
            }
        }

        // 2. INICIAR LA PANTALLA
        document.addEventListener('DOMContentLoaded', async () => {
            const sesionValida = await protegerRuta(['ADMIN']);
            if (sesionValida) {
                document.body.style.display = 'flex';
                cargarMatrizActual(); // Consultar BD al abrir
            }
        });

        // 3. CARGAR DATOS REALES DE LA BD
        async function cargarMatrizActual() {
            try {
                const res = await fetch('api_rbac.php');
                const data = await res.json();
                
                // Limpiar todos primero (excepto admin que es fijo)
                document.querySelectorAll('input[type="checkbox"]:not(:disabled)').forEach(b => b.checked = false);

                // Marcar según la base de datos
                data.forEach(permiso => {
                    const selector = `input[data-rol="${permiso.id_rol}"][data-permiso="${permiso.id_permiso}"]`;
                    const check = document.querySelector(selector);
                    if (check) check.checked = true;
                });
            } catch (error) {
                console.error("Error cargando matriz:", error);
            }
        }

        // 4. GUARDAR CAMBIOS HACIA LA API
        async function guardarRBAC() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked:not(:disabled)');
            let permisosActivos = [];

            checkboxes.forEach(box => {
                permisosActivos.push({
                    id_rol: box.getAttribute('data-rol'),
                    id_permiso: box.getAttribute('data-permiso')
                });
            });

            const msj = document.getElementById('mensajeGuardado');
            const loader = document.getElementById('statusLoader');
            
            msj.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch('api_rbac.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(permisosActivos)
                });
                
                const result = await res.json();
                loader.style.display = 'none';
                msj.style.display = 'block';

                if (result.status === 'ok') {
                    msj.style.backgroundColor = '#dcfce7';
                    msj.style.color = '#166534';
                    msj.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${result.mensaje}`;
                    
                    // Opcional: Recargar después de 2 segundos para asegurar sincronía
                    setTimeout(() => { msj.style.display = 'none'; }, 3000);
                } else {
                    msj.style.backgroundColor = '#fee2e2';
                    msj.style.color = '#b91c1c';
                    msj.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> ${result.mensaje}`;
                }
            } catch (error) {
                loader.style.display = 'none';
                msj.style.display = 'block';
                msj.style.backgroundColor = '#fee2e2';
                msj.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Error de conexión con el servidor.';
            }
        }
    </script>
</body>
</html>
