<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Profesores | TONI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="main-card">
        <div class="card-header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="color: var(--primary-dark);"><i class="fa-solid fa-chalkboard-user"></i> Módulo Profesores</h3>
            </div>
        </div>

        <div class="modulo-seccion">
            <div class="nav-buttons">
                <button class="nav-btn active" id="btnForm" onclick="switchSubView('form')">Nuevo Profesor</button>
                <button class="nav-btn" id="btnTable" onclick="switchSubView('table')">Lista</button>
            </div>

            <div class="slider-viewport">
                <div class="slider-track view-form" id="track">
                    
                    <div class="slide slide-form">
                        <form id="profesorForm">
                            <div class="form-group">
                                <label>Nombre Completo</label>
                                <input type="text" name="nombre" id="nombre" placeholder="Ej. Juan Pérez" required>
                            </div>
                            <div class="form-group">
                                <label>Correo Electrónico</label>
                                <input type="email" name="correo" id="correo" placeholder="profesor@escuela.com" required>
                            </div>
                            <div class="form-group">
                                <label>Contraseña (Se guardará en BCRYPT)</label>
                                <input type="password" name="password" id="password" placeholder="Contraseña segura" required>
                            </div>
                            <button type="submit" class="btn-submit">Registrar Profesor</button>
                        </form>
                    </div>

                    <div class="slide slide-table">
                        <div class="table-wrapper">
                            <table class="glass-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Correo</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaCuerpo"></tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        function switchSubView(view) {
            const track = document.getElementById('track');
            document.getElementById('btnForm').classList.toggle('active', view === 'form');
            document.getElementById('btnTable').classList.toggle('active', view === 'table');

            if (view === 'form') {
                track.style.transform = 'translateX(0)';
            } else {
                track.style.transform = 'translateX(-50%)';
                cargarProfesores();
            }
        }

        async function cargarProfesores() {
            try {
                const res = await fetch('api_get_profesores.php');
                const data = await res.json();
                const tbody = document.getElementById('tablaCuerpo');
                tbody.innerHTML = '';
                
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No hay profesores registrados</td></tr>';
                    return;
                }

                data.forEach(p => {
                    tbody.innerHTML += `<tr>
                        <td><span class="badge">${p.id_profesor}</span></td>
                        <td>${p.nombre}</td>
                        <td>${p.correo}</td>
                    </tr>`;
                });
            } catch (e) {
                console.error("Error al cargar profesores", e);
            }
        }

        document.getElementById('profesorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const res = await fetch('api_alta_profesor.php', { 
                    method: 'POST', 
                    body: formData 
                });
                const json = await res.json();
                
                alert(json.mensaje);
                
                if (json.status === 'ok') {
                    e.target.reset();
                    // Cambiar automáticamente a la vista de tabla para ver el resultado
                    switchSubView('table');
                }
            } catch (error) {
                alert("Error de conexión al servidor.");
            }
        });
    </script>
</body>
</html>
