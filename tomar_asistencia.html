<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pase de Lista | DSS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .radio-group { display: flex; gap: 15px; justify-content: center; }
        .radio-group label { font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .lbl-presente { color: #16a34a; }
        .lbl-falta { color: #dc2626; }
        .lbl-retardo { color: #ca8a04; }
    </style>
</head>
<body style="display: none;"> <div class="main-card" style="max-width: 700px; margin: auto; margin-top: 5vh;">
        <div class="card-header">
            <h2 style="color: var(--text-main); font-size: 20px;"><i class="fa-solid fa-clipboard-user"></i> Pase de Lista</h2>
            <p id="infoClase" style="font-size: 13px; color: var(--text-muted);">Materia: Desarrollo de Software Seguro | Grupo: 82T</p>
        </div>
        
        <div style="padding: 20px 30px;">
            <form id="formAsistencia">
                <input type="hidden" name="id_materia" value="1"> 
                <input type="hidden" name="fecha" value="2026-02-27">

                <div class="table-wrapper">
                    <table class="glass-table">
                        <thead>
                            <tr>
                                <th>No. Control</th>
                                <th>Alumno</th>
                                <th style="text-align: center;">Estado de Asistencia</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>22560087</td>
                                <td>GORA ELIAN</td>
                                <td>
                                    <div class="radio-group">
                                        <label class="lbl-presente"><input type="radio" name="asistencia[1]" value="Presente" required> P</label>
                                        <label class="lbl-falta"><input type="radio" name="asistencia[1]" value="Falta"> F</label>
                                        <label class="lbl-retardo"><input type="radio" name="asistencia[1]" value="Retardo"> R</label>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>21090123</td>
                                <td>JASKIER EL BARDO</td>
                                <td>
                                    <div class="radio-group">
                                        <label class="lbl-presente"><input type="radio" name="asistencia[2]" value="Presente" required> P</label>
                                        <label class="lbl-falta"><input type="radio" name="asistencia[2]" value="Falta"> F</label>
                                        <label class="lbl-retardo"><input type="radio" name="asistencia[2]" value="Retardo"> R</label>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <button type="submit" class="btn-submit" style="margin-top: 20px;">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Guardar Asistencia
                </button>
            </form>
            <div id="resultadoAsistencia" style="margin-top: 15px; text-align: center;"></div>
        </div>
    </div>

    <script>
        // 1. MIDDLEWARE DE SEGURIDAD
        async function protegerRuta(rolesPermitidos) {
            try {
                const res = await fetch('api_verificar_sesion.php');
                if (!res.ok) throw new Error("No autenticado");
                const sesion = await res.json();
                
                if (!sesion.autenticado || !rolesPermitidos.includes(sesion.rol)) {
                    window.location.replace('index.html');
                    return false;
                }
                return sesion;
            } catch (error) {
                window.location.replace('index.html');
                return false;
            }
        }

        // 2. INICIAR LA PANTALLA
        document.addEventListener('DOMContentLoaded', async () => {
            const sesionValida = await protegerRuta(['PROFESOR', 'ADMIN']);
            
            if (sesionValida) {
                document.body.style.display = 'flex'; // Mostrar la vista para Profesor
                // Podemos personalizar usando los datos de sesión seguros
                console.log("Sesión activa de:", sesionValida.nombre);
            }
        });

        // 3. FUNCIONES DE LA VISTA
        document.getElementById('formAsistencia').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = { id_materia: formData.get('id_materia'), fecha: formData.get('fecha'), alumnos: {} };

            for (let [key, value] of formData.entries()) {
                if (key.startsWith('asistencia[')) {
                    let id_alumno = key.match(/\[(\d+)\]/)[1];
                    data.alumnos[id_alumno] = value;
                }
            }

            const responseDiv = document.getElementById('resultadoAsistencia');
            responseDiv.innerHTML = '<span style="color: #64748b;">Guardando de forma segura...</span>';

            try {
                const res = await fetch('api_guardar_asistencia.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                
                if(json.status === 'ok') {
                    responseDiv.innerHTML = `<span style="color: #16a34a;"><i class="fa-solid fa-check"></i> ${json.mensaje}</span>`;
                } else {
                    responseDiv.innerHTML = `<span style="color: #dc2626;"><i class="fa-solid fa-triangle-exclamation"></i> ${json.mensaje}</span>`;
                }
            } catch (error) {
                responseDiv.innerHTML = '<span style="color: #dc2626;">Error de red.</span>';
            }
        });
    </script>
</body>
</html>
